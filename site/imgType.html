<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="imjihyeon">
  <meta name="description" content="웹 퍼블리셔를 위한 정보 공유 사이트입니다.">
  <meta name="keywords"
    content="임지현, 웹 퍼블리셔, 웹 표준, 웹 접근성, 레이아웃, imjihyeon, publisher, css3, html, markup, design, imjihyeon">
  <title>imgType</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/common.css">

  <link rel="stylesheet" href="css/imgType.css">

  <!-- 나눔스퀘어 웹 폰트 -->
  <link rel="stylesheet" href="https://cdn.rawgit.com/moonspam/NanumSquare/master/nanumsquare.css">

</head>

<body>
  <!-- imgType01 -->
  <section class="imgType">
    <div class="container">
      <div class="imgType01">
        <h2>여름에 어울리는 여행지</h2>
        <div class="img-wrap">
          <div class="img">
            <img src="img/imgType01.jpg" alt="국내여행 이미지">
            <div class="img-list">
              <strong class="img-tit">국내여행</strong>
              <p class="img-desc">편하고 빠르게 돌아볼 수 있고 <br />간편하게 즐기는 국내 여행</p>
              <span class="img-link"><a href="#">자세히보기</a></span>
            </div>
          </div>
          <div class="img">
            <img src="img/imgType02.jpg" alt="해외여행 이미지">
            <div class="img-list">
              <strong class="img-tit">해외여행</strong>
              <p class="img-desc">처음보는 것들이 가득한 <br />다양한 문화와 마주하는 해외여행</p>
              <span class="img-link"><a href="#">자세히보기</a></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <!-- //mgType01 -->

  <!-- imgType02 -->
  <section class="imgType">
    <div class="container">
      <div class="imgType02">
        <h2>지금 떠나는 해외여행</h2>
        <div class="img-wrap">
          <div class="img">
            <img src="img/imgType03.jpg" alt="보라카이 이미지">
            <div class="img-list">
              <strong class="img-tit">보라카이</strong>
              <span class="img-link"><a href="#">자세히보기</a></span>
            </div>
          </div>
          <div class="img">
            <img src="img/imgType04.jpg" alt="프랑스 이미지">
            <div class="img-list">
              <strong class="img-tit">프랑스</strong>
              <span class="img-link"><a href="#">자세히보기</a></span>
            </div>
          </div>
          <div class="img">
            <img src="img/imgType05.jpg" alt="일본 이미지">
            <div class="img-list">
              <strong class="img-tit">일본</strong>
              <span class="img-link"><a href="#">자세히보기</a></span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- //imgType02 -->
  </section>
</body>

</html>
