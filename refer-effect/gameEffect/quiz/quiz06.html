<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">

    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        *,
        *:before,
        *:after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a {
            text-decoration: none;
        }

        li {
            list-style: none;
        }

        body {
            font-family: 'DungGeunMo';
            background-color: #f6f6f6;
            background-image:
                linear-gradient(90deg, #cdcccc 0px, #cdcccc 1px, transparent 1px, transparent 99px, transparent 100px),
                linear-gradient(#cdcccc 0px, #cdcccc 1px, transparent 1px, transparent 99px, transparent 100px),
                linear-gradient(#e0e0e0 0px, #e0e0e0 1px, transparent 1px, transparent 99px, transparent 100px),
                linear-gradient(90deg, #e0e0e0 0px, #e0e0e0 1px, transparent 1px, transparent 99px, transparent 100px),
                linear-gradient(transparent 0px, transparent 5px, #f6f6f6 5px, #f6f6f6 95px, transparent 95px, transparent 100px),
                linear-gradient(90deg, #e0e0e0 0px, #e0e0e0 1px, transparent 1px, transparent 99px, #e0e0e0 99px, #e0e0e0 100px),
                linear-gradient(90deg, transparent 0px, transparent 5px, #f6f6f6 5px, #f6f6f6 95px, transparent 95px, transparent 100px),
                linear-gradient(transparent 0px, transparent 1px, #f6f6f6 1px, #f6f6f6 99px, transparent 99px, transparent 100px),
                linear-gradient(#cdcccc, #cdcccc);
            background-size: 100px 100%, 100% 100px, 100% 10px, 10px 100%, 100% 100px, 100px 100%, 100px 100%, 100px 100px, 100px 100px;
            padding: 100px 0;
        }

        header {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            background: #262626;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 10px;
            z-index: 10;
        }

        header::before {
            content: '';
            width: calc(100% - 10px);
            height: calc(100% - 10px);
            position: absolute;
            left: 5px;
            top: 5px;
            border: 4px ridge #a3a3aa;
            z-index: -1;
        }

        header h1 {
            padding: 5px 30px 5px 20px;
        }

        nav ul {
            display: flex;
        }

        nav li {
            margin-right: 30px;
        }

        nav li a {
            color: #ababab;
        }

        nav li a:hover {
            border-bottom: 1px solid #ababab;
            ;
        }

        nav li.active a {
            color: #fff;
        }

        nav li.active a:hover {
            border-bottom: 1px solid #fff;
            ;
        }

        .ham {
            position: absolute;
            right: 20px;
            top: 16px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: none;
        }

        .ham span {
            width: 20px;
            height: 3px;
            background: #fff;
            display: block;
            position: absolute;
            left: 5px;
            top: 13px;
        }

        .ham span::before {
            content: '';
            width: 20px;
            height: 3px;
            background: #fff;
            position: absolute;
            left: 0;
            top: 7px;
        }

        .ham span::after {
            content: '';
            width: 20px;
            height: 3px;
            background: #fff;
            position: absolute;
            left: 0;
            bottom: 7px;
        }

        .quizWrap {
            max-width: 500px;
            background: #fff;
            margin: 30px auto;
            border: 8px ridge #cacaca;
            position: relative;
        }

        .quizWrap h2 {
            font-size: 14px;
            text-align: center;
            background: #cacaca;
            color: #3b3b3b;
            border: 3px ridge #cacaca;
            padding-top: 3px;
            position: relative;
        }

        .quizWrap h2::before {
            content: '';
            position: absolute;
            left: 2px;
            top: 2px;
            width: 15px;
            height: 15px;
            background: url(dot.jpg) no-repeat;
            background-size: cover;
        }

        .quizWrap h2::after {
            content: '';
            position: absolute;
            right: 2px;
            top: 2px;
            width: 35px;
            height: 15px;
            background: url(dot.jpg) no-repeat -14px;
            background-size: cover;
        }

        .question_quiz {
            border: 4px ridge #cacaca;
            min-height: 400px;
        }

        .question_quiz .question_title {
            position: relative;
            font-size: 34px;
            border-bottom: 6px ridge #CACACA;
            padding: 20px 0 0 0;
            overflow: hidden;
        }

        .question_title .num {
            color: #A5E151;
            font-size: 34px;
            text-shadow: 1px 1px 1px #000;
            padding-left: 20px;
        }

        .question_title .num::after {
            content: '.';
        }

        .question_title .ask {
            font-size: 24px;
            line-height: 1.4;
            padding: 10px 20px 10px 20px;
            display: inline-block;
        }

        .question_answer {
            background: #e8e7e8;
            padding: 20px;
        }

        .question_answer_next {
            font-family: 'DungGeunMo';
            background: #cacaca;
            text-align: center;
            padding: 13px 20px;
            border: 6px groove #fff;
            font-size: 22px;
            text-shadow: 1px 1px 1px #fff;
            width: 100%;
            display: none;
        }

        .question_answer_next:active {
            background: #a3a3a3;
        }

        .question_answer_next.show {
            display: block;
        }

        .question_answer_view {
            text-align: center;
            border: 6px groove #fff;
            padding: 13px 20px;
            font-size: 22px;
            text-shadow: 1px 1px 1px #fff;
            /* display: none; */
        }

        .question_answer_ex {
            padding: 20px;
            line-height: 1.4;
        }

        .card {
            display: none;
            position: relative;
            width: 360px;
            /* height: 480px; */
            margin: 20px auto;
        }

        .dog .head,
        .dog .body {
            position: relative;
            width: 115px;
        }

        .dog .head {
            height: 115px;
            border-radius: 50% 50% 0 0;
            margin: 0 auto;
        }

        .dog .ears {
            position: relative;
            top: -14%;
            width: 100%;
        }

        .dog .ears::before,
        .dog .ears::after {
            content: "";
            position: absolute;
            top: 0;
            width: 35px;
            height: 70px;
            background: #CB7A1D;
            border-top: 11px solid #F7AA2B;
            border-left: 7px solid #F7AA2B;
            border-right: 7px solid #F7AA2B;
        }

        .dog .ears::before {
            left: 0;
            border-radius: 50% 45% 0 0;
        }

        .dog .ears::after {
            right: 0;
            border-radius: 45% 50% 0 0;
        }

        .dog .face {
            position: absolute;
            background: #F7AA2B;
            width: 100%;
            height: 100%;
            border-radius: 50% 50% 0 0;
        }

        .dog .face::before,
        .dog .face::after {
            content: "";
            display: block;
            margin: auto;
            background: #FEFEFE;
        }

        .dog .face::before {
            width: 15px;
            height: 35px;
            margin-top: 24px;
            border-radius: 20px 20px 0 0;
        }

        .dog .face::after {
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            width: 60px;
            height: 65px;
            border-radius: 45% 45% 0 0;
        }

        .dog .eyes {
            position: relative;
            top: 29%;
            text-align: center;
        }

        .dog .eyes::before,
        .dog .eyes::after {
            content: "";
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 100%;
            background: #451d1c;
            margin: 0 14.5%;
        }

        .dog .teardrop {
            position: absolute;
            top: 125%;
            left: 19%;
            width: 6px;
            height: 6px;
            border-radius: 0 50% 50% 50%;
            transform: rotate(45deg);
            background: #FEFEFE;
            visibility: hidden;
        }

        .dog .nose {
            position: relative;
            top: 35%;
            width: 16px;
            height: 8px;
            border-radius: 35px 35px 65px 65px;
            background: #451d1c;
            margin: auto;
        }

        .dog .mouth {
            position: relative;
            top: 34.5%;
            width: 4px;
            height: 6px;
            margin: 0 auto;
            text-align: center;
            background: #451d1c;
        }

        .dog .mouth::before,
        .dog .mouth::after {
            content: "";
            position: absolute;
            top: -4px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 4px solid #451d1c;
            border-left-color: transparent;
            border-top-color: transparent;
            z-index: 2;
        }

        .dog .mouth::before {
            transform: translateX(-89%) rotate(45deg);
        }

        .dog .mouth::after {
            transform: translateX(-2px) rotate(45deg);
        }

        .dog .tongue {
            position: relative;
            z-index: 1;
        }

        .dog .tongue::before,
        .dog .tongue::after {
            content: "";
            position: absolute;
        }

        .dog .tongue::before {
            top: 10px;
            left: -7px;
            width: 18px;
            height: 0;
            border-radius: 50%;
            background: #451d1c;
            z-index: -1;
        }

        .dog .tongue::after {
            top: 14px;
            left: -4px;
            width: 12px;
            height: 0;
            border-radius: 20px;
            background: #F5534F;
            z-index: 5;
        }

        .dog .chin {
            position: relative;
            top: 47.5%;
            margin: 0 auto;
            width: 12px;
            height: 12px;
            border-top: 10px solid #e8e7ec;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-radius: 2px;
            z-index: 0;
        }

        .dog .body {
            position: relative;
            height: 139px;
            margin: auto;
            z-index: 0;
        }

        .dog .body::before,
        .dog .body::after {
            content: "";
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            bottom: 0;
            display: block;
            width: 100%;
            margin: auto;
            background: #F7AA2B;
        }

        .dog .body::after {
            top: -2px;
            bottom: -1px;
            width: 60px;
            background: #FEFEFE;
        }

        .dog .tail {
            position: absolute;
            left: -60%;
            bottom: 1px;
            background: #F7AA2B;
            width: 93px;
            height: 15px;
            transform: rotate(45deg);
            transform-origin: 100% 50%;
            border-radius: 25px 0 0 25px;
            z-index: -2;
        }

        .dog .legs {
            position: absolute;
            bottom: 0;
            left: -10%;
            width: 120%;
            height: 15%;
            background: #F7AA2B;
            border-radius: 10px 10px 0 0;
        }

        .dog .legs::before,
        .dog .legs::after {
            content: "";
            position: absolute;
            bottom: 1px;
            background: #CB7A1D;
            z-index: -1;
        }

        .dog .legs::before {
            left: -7.5%;
            width: 115%;
            height: 55%;
            border-radius: 5px 5px 0 0;
        }

        .dog .legs::after {
            left: -3.5%;
            width: 107%;
            height: 250%;
            border-radius: 20px 20px 35px 35px;
        }

        .card.good .face::before {
            margin-top: 100px;
        }

        .card.good .face::after {
            height: 85px;
        }

        .card.good .eyes {
            top: 13%;
        }

        .card.good .eyes::before,
        .card.good .eyes::after {
            width: 18px;
            height: 5px;
            margin: 0px 12.5%;
            transform: rotate(-37.5deg);
            border-radius: 20px;
        }

        .card.good .eyes::after {
            transform: rotate(37.5deg);
        }

        .card.good .nose {
            top: 18%;
        }

        .card.good .mouth {
            top: 16.5%;
        }

        .card.good .tongue::before {
            height: 12px;
        }

        .card.good .tongue::after {
            height: 24px;
            -webkit-animation: movetongue 0.1s linear 0.35s infinite alternate forwards;
            animation: movetongue 0.1s linear 0.35s infinite alternate forwards;
        }

        .card.good .chin {
            top: 34%;
        }

        .card.good .tail {
            -webkit-animation: movetail 0.1s linear infinite alternate forwards;
            animation: movetail 0.1s linear infinite alternate forwards;
        }

        .card.bad .ears::before {
            transform: rotate(-50deg) translate(-7px, 2px);
        }

        .card.bad .ears::after {
            transform: rotate(50deg) translate(7px, 2px);
        }

        .card.bad .face::before {
            margin-top: 28px;
        }

        .card.bad .face::after {
            height: 55px;
        }

        .card.bad .eyes {
            top: 38%;
        }

        .card.bad .eyes::before,
        .card.bad .eyes::after {
            width: 18px;
            height: 5px;
            margin: 0px 14.5%;
            transform: rotate(-37.5deg);
            border-radius: 20px;
        }

        .card.bad .eyes::after {
            transform: rotate(37.5deg);
        }

        .card.bad .teardrop {
            animation: cry .8s ease-in .5s infinite;
        }

        .card.bad .nose {
            top: 44%;
        }

        .card.bad .mouth {
            top: 42%;
        }

        .card.bad .chin {
            top: 52%;
        }

        .card.bad .tail {
            transform: rotate(0);
        }


        @keyframes movetongue {
            100% {
                height: 27px;
            }
        }

        @keyframes movetail {
            0% {
                transform: rotate(37deg);
            }

            100% {
                transform: rotate(52deg);
            }
        }

        @keyframes cry {
            0% {
                height: 0;
                width: 0;
            }

            30% {
                visibility: visible;
            }
        }


        .question_answer_selects {
            padding-bottom: 10px;
        }

        .question_answer_selects label {
            display: flex;
            position: relative;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .question_answer_selects label span {
            font-size: 20px;
            padding: 11px 35px 11px 45px;
            line-height: 1;
            border-radius: 50px;
            position: relative;
            min-height: 40px;
        }

        .question_answer_selects label span:hover {
            background-color: #d6ecb6;
        }

        .question_answer_selects label span::before {
            content: '';
            width: 30px;
            height: 30px;
            background: #fff;
            border-radius: 50%;
            box-shadow: inset 0 0 0 3px #000;
            position: absolute;
            left: 7px;
            top: 6px;
            transition: .25s ease;
        }

        .question_answer_selects label input {
            position: absolute;
            left: -9999px;
        }

        .question_answer_selects label span {
            width: 100%;
            position: relative;
        }

        .question_answer_selects label span i {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* .question_answer_selects input:checked+span {
            background-color: rgb(201, 223, 169);
        }

        .question_answer_selects input:checked+span::before {
            box-shadow: inset 0 0 0 10px #a5e151;
        } */

        .question_answer_selects label.correct input+span {
            background-color: rgb(178, 216, 122);
        }

        .question_answer_selects label.correct input+span::before {
            box-shadow: inset 0 0 0 10px #6c9b2b;
        }

        .question_answer_selects label.incorrect input+span {
            background-color: #e66072;
        }

        .question_answer_selects label.incorrect input+span::before {
            box-shadow: inset 0 0 0 10px #a3293a;
        }

        .question_answer_selects label.disabled {
            pointer-events: none;
        }

        .question_timer {
            position: absolute;
            left: 0;
            bottom: 0;
            /* background: #cacaca; */
            width: 100%;
            border-bottom: 4px ridge #a3a3aa;
            text-align: right;
        }

        .question_timer_sec {
            display: inline-block;
            width: 50px;
            height: 50px;
            background: #000;
            color: #fff;
            text-align: center;
            line-height: 50px;
            font-size: 20px;
            position: absolute;
            right: 10px;
            top: 10px;
            border-radius: 50%;
        }

        .question_timer_line {
            width: 0%;
            height: 5px;
            background: #C2EA8B;
            transition: all .3s;
        }

        .question_answer_count {
            text-align: center;
            padding-bottom: 20px;
            font-size: 20px;
        }

        .question_start {
            font-size: 30px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            display: none;
        }

        .question_start.active {
            display: flex;
        }

        .question_start span {
            background: #fff;
            padding: 10px 20px;
            border-radius: 100px;
            cursor: pointer;
        }

        @media (max-width: 1200px) {
            nav {
                position: absolute;
                left: 0;
                top: 62px;
                width: 100%;
                z-index: -99999;
                background: #262626;
                display: none;
            }

            nav.show {
                display: block;
            }

            nav ul {
                display: block;
                position: relative;
                padding: 20px;
                z-index: 1;
            }

            nav ul::before {
                content: '';
                width: calc(100% - 10px);
                height: calc(100% - 10px);
                border: 4px ridge #a3a3a3;
                position: absolute;
                left: 5px;
                top: 5px;
                z-index: -1;
            }

            nav li {
                padding: 5px;
            }

            .ham {
                display: block;
            }
        }
    </style>
</head>

        //문제 정보
        const quizInfo = [{

            {

                quizAnswer: '텍스타일 디자인',
                quizChoice: [
                    '포스터 디자인',
                    '신문 광고 디자인',
                    'TV 광고 디자인',

                ],
                quizEx: '시각 디자인의 4대 매체는 포스터 디자인, 신문 광고 디자인, TV 광고 디자인, 잡지 광고 디자인 입니다.'
            },
            {
                quizNum: 3,
                quizQuestion: '다음과 가장 관게 있는 디자인 원리는? <br>[바다 위의 빨간 등대, 무성한 나뭇잎들 사이에서 핀 꽃, 별이 총총한 밤하늘에 뜬 달, 평평한 벽에 생긴 갈라진 틈 등]',
                quizAnswer: '강조',
                quizChoice: [
                    '조화',
                    '통일',
                    '점증',
                    '강조',
                ],
                quizEx: '강조 : 어떤 특정 부분을 강하게 표현하여 두드러지게 하는 것'
            }
        ];

        //선택자
        const quizWrap = document.querySelector(".quizWrap");
        const questionStart = document.querySelector(".question_start");
        const questionStartBtn = quizWrap.querySelector(".question_start span");
        const questionTitle = quizWrap.querySelector(".question_title_q");
        const questionSelect = quizWrap.querySelector(".question_answer_selects");
        const questionLength = quizWrap.querySelector(".question_answer_count");
        const questionNextBtn = quizWrap.querySelector(".question_answer_next");
        const questionTimer = quizWrap.querySelector(".question_timer_sec");
        const questionTimerLine = quizWrap.querySelector(".question_timer_line");

        let quizCount = 0;
        let quizNum = 1;
        let counter;
        let counterLine;
        let timer = 15;

        //시작버튼 클릭
        questionStartBtn.onclick = () => {
            questionStart.classList.remove("active");
            showQuestion(quizCount);
            questionCount(quizNum);
            startTimer(timer);
            startTimerLine(0);
        };

        //문제 출력하기
        function showQuestion(index) {
            let questionsTag = `
                <span class="num">${quizInfo[index].quizNum}</span>
                <span class="ask">${quizInfo[index].quizQuestion}</span>
            `;
            let choiceTag = `
                <label for="select1">
                    <input type="radio" class="select" name="select" id="select1" value="1">
                    <span class="choice">${quizInfo[index].quizChoice[0]}</span>
                </label>
                <label for="select2">
                    <input type="radio" class="select" name="select" id="select2" value="2">
                    <span class="choice">${quizInfo[index].quizChoice[1]}</span>
                </label>
                <label for="select3">
                    <input type="radio" class="select" name="select" id="select3" value="3">
                    <span class="choice">${quizInfo[index].quizChoice[2]}</span>
                </label>
                <label for="select4">
                    <input type="radio" class="select" name="select" id="select4" value="4">
                    <span class="choice">${quizInfo[index].quizChoice[3]}</span>
                </label>
            `;



            questionTitle.innerHTML = questionsTag;
            questionSelect.innerHTML = choiceTag;


            let choice = questionSelect.querySelectorAll(".choice");

            for (let i = 0; i < choice.length; i++) {
                choice[i].setAttribute("onclick", "choiceSelected(this)");
            }
        }

        //정답확인
        function choiceSelected(answer) {
            //사용자가 클릭한 정답 == quizAnswer
            let userAnswer = answer.textContent;
            let currentAnswer = quizInfo[quizCount].quizAnswer;
            let allChoice = questionSelect.children.length;

            // console.log(answer);

            if (userAnswer == currentAnswer) {
                // console.log("정답");
                answer.parentNode.classList.add("correct");

            } else {
                // console.log("오답");
                answer.parentNode.classList.add("incorrect");

                //틀렸을 때 정답 알려주기
                for (let i = 0; i < allChoice; i++) {
                    let text = questionSelect.children[i].querySelector(".choice").textContent;
                    if (text == currentAnswer) {
                        questionSelect.children[i].classList.add("correct");
                    }
                }
            }

            //모든문제 클래스 추가 disabled
            for (let i = 0; i < allChoice; i++) {
                questionSelect.children[i].classList.add("disabled");
            }

            clearInterval(counter);
            clearInterval(counterLine);
            //버튼 표시
            questionNextBtn.classList.add("show");
        }

        //다음문제 클릭
        questionNextBtn.onclick = () => {
            quizCount++;
            quizNum++;
            showQuestion(quizCount);
            questionCount(quizNum);
            questionCount(timer);
            startTimer(0);
        }


        //문제 카운팅
        function questionCount(index) {
            let totalCountTag = `
                <span>${index}</span> / <span>${quizInfo.length}</span>
            `;

            questionLength.innerHTML = totalCountTag;
        }

        //타이머
        function startTimer(time) {
            counter = setInterval(() => {
                questionTimer.textContent = time;
                time--;
                if (time < 9) {
                    let addZero = questionTimer.textContent;
                    questionTimer.textContent = "0" + addZero;
                }

                if (time < 0) {
                    clearInterval(counter);
                    let allChoice = questionSelect.children.length;
                    let currentAnswer = quizInfo[quizCount].quizAnswer;

                    //클릭X
                    for (let i = 0; i < allChoice; i++) {
                        questionSelect.children[i].classList.add("disabled");
                    }

                    //정답 표시
                    for (let i = 0; i < allChoice; i++) {
                        if (questionSelect.children[i].querySelector(".choice").textContent == currentAnswer) {
                            questionSelect.children[i].classList.add("correct");
                        }
                    }

                    //버튼 표시
                    questionNextBtn.classList.add("show");
                }

            }, 1000);
        }

        function startTimerLine(time) {
            let cnt = 0;
            counterLine = setInterval(() => {
                // time += 0.066;
                time = (cnt/timer)*100;
                cnt++;
                questionTimerLine.style.width = time + "%";
                if (time > 100) {
                    clearInterval(counterLine);
                }
            }, 1000);
        }
    </script>
</body>

</html>
