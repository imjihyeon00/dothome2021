<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js 연습</title>
</head>

<body>
    <script>
        function f1() {
            document.write('함수1<br/>');
        }
        f1();

        let f2 = function () {
            document.write('익명함수<br/>');
        }
        f2();

        let f3 = function (text) {
            document.write(text);
        }
        f3('매개변수<br/>');

        let f4 = function () {
            let str = '리턴값 함수<br />';
            return str;
        }
        document.write(f4());

        f5 = str => str
        document.write(f5('화살표 함수 <br />'));

        function f8(str1, str2) {
            document.write(`${str1}가 ${str2}되었습니다.<br />`);
        }
        f8('함수', '실행');
        f8('함수2', '출력');

        function f9(str1, str2) {
            document.write(str1 + str2);
        }
        let a1 = '함수', a2 = '실행되었습니다.<br />';
        f9(a1, a2);

        function f10(str1, str2) {
            document.write(str1 + str2);
        }
        let a = ['함수가', '실행<br>'];
        f10(a[0], a[1]);

        function f11(str1, str2) {
            document.write(str1 + str2);
        }
        let ab = { a: '함수', b: '실행<br/>' };
        f11(ab.a, ab.b);

        function f12(str1, str2) {
            document.write(str1 + str2);
        }

        let abc = [{ a: '함수' }, { a: '실행<br />' }];
        f12(abc[0].a, abc[1].a);

        function func10(str1, str2) {
            this.str1 = str1;
            this.str2 = str2;
            this.resulet = function () { document.write(str1 + str2); }

        }

        const info1 = new func10('함수', '실행');
        info1.resulet();

    </script>
</body>

</html>
