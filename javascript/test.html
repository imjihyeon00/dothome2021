<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js 연습</title>
</head>

<body>
    <script>
        //변수 : 데이터 저장소
        //100, 200, 300 변수에 저장해 출력해보세요.
        {
            let a = 100;
            let b = 200;
            let c = 300;

            document.write("***100, 200, 300 변수에 저장해 출력***<br>")
            document.write("a: " + a, "<br>");
            document.write("b: " + b, "<br>");
            document.write("c: " + c, "<br>");

            document.write("<br>");
        }
        //배열
        //100, 200, 300 배열에 저장해 출력해보세요.
        {
            const arr = [100, 200, 300];

            document.write("***100, 200, 300 배열에 저장해 출력***<br>")
            document.write("arr[0]: " + arr[0], "<br>");
            document.write("arr[1]: " + arr[1], "<br>");
            document.write("arr[2]: " + arr[2], "<br>");

            document.write("<br>");
        }
        //객체
        //100, 200, 300 객체에 저장해 출력해보세요.
        {
            const obj = {
                a: 100,
                b: 200,
                c: 300
            };

            document.write("***100, 200, 300 객체에 저장해 출력***<br>")
            document.write("obj.a: " + obj.a, "<br>");
            document.write("obj.b: " + obj.b, "<br>");
            document.write("obj.c: " + obj.c, "<br>");

            document.write("<br>");
        }
        //반복문
        //for문을 이용해서 1~50까지 출력을 해보세요!!
        {
            document.write("***for문을 이용해서 1~50까지 출력***<br>")
            for (let i = 1; i <= 50; i++) {
                document.write(i + " &nbsp;");
            }
            document.write("<br>");
        }
        //반복문
        //for문을 이용해서 50~1까지 출력
        {
            document.write("***for문을 이용해서 50~1까지 출력***<br>")
            for (let i = 50; i >= 1; i--) {
                document.write(i + " &nbsp;");
            }
            document.write("<br><br>");
        }
        //반복문
        //for문을 이용해서 1~50까지 짝수만 출력
        {
            document.write("***for문을 이용해서 1~50까지 짝수만 출력***<br>")
            for (let i = 1; i <= 50; i++) {
                if (i % 2 == 0) document.write(i + " &nbsp;");
            }
            document.write("<br><br>");
        }
        //반복문
        //for문을 이용해서 1~50까지 홀수만 출력
        {
            document.write("***for문을 이용해서 1~50까지 홀수만 출력***<br>")
            for (let i = 1; i <= 50; i++) {
                if (i % 2 != 0) document.write(i + " &nbsp;");
            }
            document.write("<br><br>");
        }
        //반복문
        //for문을 이용해서 구구단 8단 출력
        {
            document.write("***for문을 이용해서 구구단 8단 출력***<br>")
            for (let i = 1; i <= 9; i++) {
                let sum = 8 * i;
                document.write("8 * " + i + " = " + sum, "<br>");

            }
            document.write("<br>");
        }
        //반복문
        //for문을 이용해서 구구단 5~8단 출력
        {
            document.write("***for문을 이용해서 구구단 5~8단 출력***<br>")
            for (let i = 5; i <= 8; i++) {
                for (let j = 1; j <= 9; j++) {
                    let sum = i * j;
                    document.write(i + " * " + j + " = " + sum,"<br>");
                }
                document.write("<br>");
            }
        }

        //배열의 갯수
        {
            document.write("***배열의 길이***<br>")
            const num = [100,200,300,400,500];

            document.write("num의 길이: " + num.length);
            document.write("<br><br>");
        }
        

        //배열의 세번째 값만 출력
        {
            document.write("***배열의 3번째 값***<br>")
            const num = [100,200,300,400,500];

            document.write("num의 3번째 값: " + num[2]);
            document.write("<br><br>");
        }

        //for문을 이용해서 모든 값 출력
        {
            document.write("***for문을 이용해서 모든 값 출력***<br>")
            const num = [100,200,300,400,500];

            for( let i = 0; i < num.length; i++){
                document.write(num[i], "&nbsp;");
            }

            document.write("<br><br>");
        }
        //forEach()를 이용해서 모든 값 출력
        {
            document.write("***forEach()를 이용해서 모든 값 출력***<br>")
            const num = [100,200,300,400,500];

            // num.forEach(function(el,idx,arr){
            //     document.write(el, "&nbsp;");
            // });

            num.forEach((el)=>{
                document.write(el, "&nbsp;");
            });
            document.write("<br><br>");
        }

        //for in문 이용해서 모든값 출력
        {
            document.write("***for in문 이용해서 모든 값 출력***<br>");
            const num = [100,200,300,400,500];

            for(let i in num){
                document.write(num[i], "&nbsp;");
            }
            document.write("<br><br>");
        }

        //for of문 이용해서 모든값 출력
        {
            document.write("***for of문 이용해서 모든 값 출력***<br>");
            const num = [100,200,300,400,500];

            for(let i of num){
                document.write(i, "&nbsp;");
            }
            document.write("<br><br>");
        }

        //데이터 출력
        {
            const arr = [100,200,300,400,500];

            //for문을 이용해 출력
            document.write("*** for문을 이용해서 모든 값 출력 ***<br>");
            for(let i = 0; i < arr.length; i++){
                document.write(arr[i],' ');
            }
            document.write("<br><br>");

            //forEach()를 이용해 출력(function 이용)
            document.write("*** forEach()를 이용해서 모든 값 출력 ***<br>");
            //arr.forEach(el => document.write(el,' ') );
            arr.forEach(function(el){
                document.write(el,' ');
            });
            document.write("<br><br>");

            //for of문
            document.write("*** for of문을 이용해서 모든 값 출력 ***<br>");
            for(let i of arr){
                document.write(i,' ');
            }
            document.write("<br><br>");

            //for in문
             document.write("*** for in문을 이용해서 모든 값 출력 ***<br>");
            for(let i in arr){
                document.write(arr[i],' ');
            }
            document.write("<br><br>");

            //배열에서 300을 찾은 다음 찾았으면 출력
            document.write("*** 배열에서 300을 찾은 다음 찾았으면 출력 ***<br>");
            // arr.find(el => {
            //     if(el === 300)
            //         document.write(el);
            // });
            document.write(arr.find(el => el === 300));
            document.write("<br><br>");
        }

        {
            //"함수가 실행되었습니다."를 function을 이용해 출력
            document.write("*** 선언적 함수 ***<br>");
            function func1(){
                document.write('함수가 실행되었습니다.');
            }
            func1();
            document.write("<br><br>");
            
            document.write("*** 익명 함수 ***<br>");
            const func2 = function(){
                document.write('함수가 실행되었습니다.');
            }
            func2();
            document.write("<br><br>");

            document.write("*** 매개변수 함수 ***<br>");
            const func3 = function(str){
                document.write(str);
            }
            func3('함수가 실행되었습니다.');
            document.write("<br><br>");
            
            document.write("*** 리턴값 함수 ***<br>");
            function func4 (){
                const str = '함수가 실행되었습니다.';
                return str;
            }
            document.write(func4());
            document.write("<br><br>");
            
        }

    </script>
</body>

</html>
