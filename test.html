<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #fce4ec;
        }

        .wrap {
            width: 1200px;
            height: 100vh;
            margin: 0 auto;
            color: #fff;
            font-size: 30px;
            text-align: center;
        }

        header {
            height: 10%;
            background-color: #880e4f;
        }

        nav {
            height: 10%;
            background-color: #ad1457;
        }

        main {
            height: 70%;
            background-color: #e91e63;
        }

        aside {
            width: 30%;
            height: 100%;
            background-color: #ec407a;
            float: left;
        }

        section {
            width: 70%;
            height: 50%;
            background-color: #f06292;
            float: left;
            text-align: center;
        }
        
        section:last-child{
            background-color: #f48fb1;
        }

        article {
            width: 320px;
            padding: 150px 26px;
            margin: 17px;
            background-color: #f06292;
            display: inline-block;
        }

        footer {
            height: 10%;
            background-color: #ad1457;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header>HEADER</header>
        <nav>NAV</nav>
        <main>
            <aside>SIDE</aside>
            <section>CONTNET1</section>
            <section>
                <article>cont1</article>
                <article>cont2</article>
            </section>
        </main>
        <footer>FOOTER</footer>
    </div>
</body>

</html>
